# 상대 경로: src/main/resources/application-dev.yml
#
# 로컬 개발 전용 프로파일.
#  - ddl-auto: update    : 엔티티 기반 자동 스키마 변경 (운영 누수 방지를 위해 prod 와 분리)
#  - show-sql: true       : SQL 디버깅 편의
#  - 로컬 Docker PG       : localhost:5432, db=gongsitoktok, user/pw=gongsi/gongsi (예시)

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gongsitoktok
    username: ${DB_USERNAME:gongsi}
    password: ${DB_PASSWORD:gongsi}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Refresh 쿠키 Secure 플래그 — dev 한정 false.
# 이유: 자기 PC 외 다른 기기(IP 주소로 접속) 시연 시 HTTP + Secure 조합이 쿠키 저장 자체를 거부.
# localhost 는 브라우저 보안 예외로 HTTP+Secure 동작하나, 192.168.x.x 같은 IP 는 예외 없음.
# 운영 환경은 HTTPS + 도메인 사용이라 application.yml 기본값(true) 그대로 유지.
refresh-token:
  cookie-secure: false

logging:
  level:
    root: INFO
    com.gongsitoktok.assistant: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
