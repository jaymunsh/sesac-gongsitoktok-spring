# 상대 경로: src/main/resources/application.yml
#
# 공시톡톡(gongsitoktok) 어시스턴트 백엔드 — 공통 설정.
# 프로파일별 갈라지는 값은 application-dev.yml / application-prod.yml 에 분리.
#
# 핵심 결정:
#  - spring.threads.virtual.enabled=true : 가상 스레드 활성 (다수 동시 챗봇 요청 대응)
#  - hikari.maximum-pool-size=15         : 가상 스레드 동시성 폭발 시 PG 풀 오버 차단
#  - management.endpoints.web.exposure.include=health : Actuator 최소 노출(§스텝 G)
#  - fastapi.base-url                    : FastAPI AI Agent 호출 베이스 URL (env 주입)
#  - jwt.* / refresh-token.* / oauth.*   : 환경별 시크릿/만료 정책

spring:
  application:
    name: gongsitoktok-assistant
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true                    # ✅ Java 21 가상 스레드 활성
  datasource:
    hikari:
      maximum-pool-size: 15            # 가상 스레드 폭주 ↔ PG 컨테이너 풀 오버 차단
      pool-name: gongsitoktok-hikari
      connection-timeout: 5000         # 5s — 풀 고갈 시 fail-fast
      idle-timeout: 300000             # 5m
      max-lifetime: 1200000            # 20m
  jpa:
    open-in-view: false                # OSIV 비활성 (가상 스레드 + LazyInitialization 함정 방지)
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

# ===== FastAPI 연동 =====
fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}

# ===== JWT (Access Token) =====
jwt:
  # 운영에서는 환경변수로 32바이트(256bit) 이상 시크릿 주입. dev 기본값은 로컬 부팅 편의.
  secret: ${JWT_SECRET:dev-secret-CHANGE-ME-32bytes-minimum-aaaaaaaa}
  access-token-validity-seconds: 3600          # 1시간
  issuer: gongsitoktok-assistant

# ===== Refresh Token (랜덤 256bit + SHA-256 해시 저장) =====
refresh-token:
  validity-seconds: 1209600                    # 14일 (60*60*24*14)
  cookie-name: refreshToken
  cookie-path: /api/v1/auth
  # 운영 기본값 true — HTTPS 환경에서만 쿠키 전송. dev profile 에서 false 로 오버라이드.
  # IP 주소(192.168.x.x) + HTTP 환경에서는 Secure 쿠키가 저장 자체 거부되어 새로고침 시 로그인 풀림.
  # localhost 는 브라우저 보안 예외로 HTTP+Secure 도 동작하나, IP 는 예외 없음.
  cookie-secure: ${REFRESH_COOKIE_SECURE:true}

# ===== CORS =====
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  oauth:
    frontend-redirect-uri: ${OAUTH_FRONTEND_REDIRECT_URI:http://localhost:3000/oauth/callback}

# ===== Spring Security · OAuth2 Client =====
# ⚠️ client-id/secret 기본값은 의도적으로 "disabled-*-client" 같은 placeholder 사용.
#    Spring Boot 의 OAuth2ClientProperties 가 빈 client-id 를 거부하므로, OAuth 미사용 시점에도
#    부팅이 통과하도록 명시 값을 둠. 실제 OAuth 활성 시점에는 .env 의 OAUTH_* 라인 주석을 해제하고
#    실제 값을 채우면 환경변수가 우선 적용됨. 활성 전까지는 /oauth2/authorization/* 호출 시 provider 측에서
#    invalid_client 응답이 떨어지지만 부팅·다른 API 동작에는 영향 없음.
spring.security.oauth2.client:
  registration:
    google:
      client-id: ${OAUTH_GOOGLE_CLIENT_ID:disabled-google-client}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:disabled-google-secret}
      scope:
        - openid
        - profile
        - email
    kakao:
      client-id: ${OAUTH_KAKAO_CLIENT_ID:disabled-kakao-client}
      client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:disabled-kakao-secret}
      client-authentication-method: client_secret_post
      authorization-grant-type: authorization_code
      redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
      scope:
        - profile_nickname
        - account_email
      client-name: Kakao
    naver:
      client-id: ${OAUTH_NAVER_CLIENT_ID:disabled-naver-client}
      client-secret: ${OAUTH_NAVER_CLIENT_SECRET:disabled-naver-secret}
      authorization-grant-type: authorization_code
      redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
      scope:
        - name
        - email
      client-name: Naver
  provider:
    kakao:
      authorization-uri: https://kauth.kakao.com/oauth/authorize
      token-uri: https://kauth.kakao.com/oauth/token
      user-info-uri: https://kapi.kakao.com/v2/user/me
      user-name-attribute: id
    naver:
      authorization-uri: https://nid.naver.com/oauth2.0/authorize
      token-uri: https://nid.naver.com/oauth2.0/token
      user-info-uri: https://openapi.naver.com/v1/nid/me
      user-name-attribute: response

# ===== Actuator (최소 노출) =====
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ===== Swagger / OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    groups-order: ASC
    tags-sorter: alpha
    operations-sorter: alpha
    # GroupedOpenApi 가 등록한 그룹 중 default 로 선택할 그룹명. 미설정 시 알파벳 순 첫 번째(internal)가 잡혀 화면이 비어 보임.
    urls-primary-name: public
